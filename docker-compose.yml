services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    shm_size: '2gb'
    networks:
      - app-network

#  Add database as service

networks:
  app-network:
    driver: bridge